<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>áClub Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');
  :root { --sky:#1a1a2e; --accent:#e94560; --gold:#f5a623; --green:#0f9b58; --dim:#8892b0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--sky); font-family:'Nunito',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; touch-action:manipulation; }
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; background:white; border-radius:50%; animation:twinkle 3s infinite alternate; }
  @keyframes twinkle { from{opacity:.2} to{opacity:.9} }
  .wrapper { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:100%; max-width:480px; padding:12px; }
  .hud { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:8px 14px; background:rgba(255,255,255,.05); border-radius:12px; border:1px solid rgba(255,255,255,.1); }
  .hud-score { font-family:'Press Start 2P',monospace; font-size:13px; color:var(--gold); text-shadow:0 0 10px rgba(245,166,35,.6); }
  .hud-lives { display:flex; gap:4px; }
  .heart { font-size:18px; transition:all .3s; }
  .heart.lost { filter:grayscale(1); opacity:.3; }
  .hud-speed { font-size:11px; color:var(--dim); font-weight:700; }
  #gameCanvas { border-radius:16px; border:2px solid rgba(255,255,255,.1); box-shadow:0 0 40px rgba(233,69,96,.2),0 20px 60px rgba(0,0,0,.5); display:block; width:100%; height:auto; touch-action:none; }
  .hint { margin-top:10px; font-size:12px; color:var(--dim); letter-spacing:.5px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .overlay { position:absolute; top:38px; left:12px; right:12px; background:rgba(10,10,20,.95); border-radius:16px; border:2px solid rgba(233,69,96,.4); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 20px; gap:14px; backdrop-filter:blur(10px); box-shadow:0 0 60px rgba(233,69,96,.15); }
  .overlay.hidden { display:none; }
  .overlay-title { font-family:'Press Start 2P',monospace; font-size:15px; color:var(--accent); text-align:center; line-height:1.6; text-shadow:0 0 20px rgba(233,69,96,.8); }
  .overlay-score { font-family:'Press Start 2P',monospace; font-size:22px; color:var(--gold); text-shadow:0 0 15px rgba(245,166,35,.7); }
  .overlay-best { font-size:13px; color:var(--dim); }
  .overlay-best span { color:#eaeaea; font-weight:900; }
  .btn { font-family:'Press Start 2P',monospace; font-size:11px; padding:14px 28px; border:none; border-radius:10px; cursor:pointer; transition:all .15s; letter-spacing:.5px; width:100%; max-width:260px; }
  .btn-play { background:linear-gradient(135deg,var(--accent),#c0392b); color:white; box-shadow:0 4px 20px rgba(233,69,96,.5); }
  .btn-play:active { transform:scale(.96); }
  .tips { font-size:10px; color:var(--dim); text-align:center; line-height:1.8; }
  .tips b { color:#eaeaea; }
  .medals { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .medal { padding:6px 12px; border-radius:8px; font-size:11px; font-weight:900; border:1px solid rgba(255,255,255,.15); }
  .medal-gold   { background:rgba(245,166,35,.2); color:var(--gold); }
  .medal-silver { background:rgba(160,160,160,.2); color:#aaa; }
  .medal-bronze { background:rgba(180,100,50,.2);  color:#cd7f32; }
  .send-status { font-size:10px; color:var(--dim); text-align:center; min-height:16px; }
  .send-status.ok  { color:#0f9b58; }
  .send-status.err { color:var(--accent); }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrapper">
  <div class="hud">
    <div class="hud-score" id="scoreDisplay">0000</div>
    <div class="hud-lives" id="livesDisplay">
      <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
    </div>
    <div class="hud-speed" id="speedDisplay">x1.0</div>
  </div>
  <canvas id="gameCanvas" width="460" height="220"></canvas>
  <div class="hint" id="hintText">← пробіл / тап — стрибок →</div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-title">áCLUB<br>RUNNER</div>
    <div class="tips">
      🦅 <b>Летючі вороги</b> — пригни (не стрибай!)<br>
      🪙 <b>Монетки</b> — збирай (+10 очок)<br>
      🦘 <b>Подвійний стрибок</b> — через групи<br>
      📈 <b>Швидкість</b> росте з часом
    </div>
    <div class="medals">
      <div class="medal medal-gold">🥇 20 á</div>
      <div class="medal medal-silver">🥈 15 á</div>
      <div class="medal medal-bronze">🥉 10 á</div>
    </div>
    <button class="btn btn-play" onclick="startGame()">▶ СТАРТ</button>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-title" id="goTitle">GAME OVER</div>
    <div class="overlay-score" id="goScore">0</div>
    <div class="overlay-best">Рекорд: <span id="bestScore">0</span></div>
    <div class="send-status" id="sendStatus">⏳ Зберігаємо результат...</div>
    <button class="btn btn-play" onclick="startGame()" style="max-width:180px">↺ ЩЕ РАЗ</button>
  </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    c.appendChild(s);
  }
})();

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W=460, H=220, GROUND=H-40;

// ── WEBHOOK URL ─────────────────────────────────────────────
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwIPJ0SNczeY91LhANfg8t3aFCD1l8YWugZRRw0hJj9rIbXnOc-sTpKUETc_Kw3_Y9t/exec";

let state='idle', score, lives, speed, frame, obstacles, coins, enemies, particles, bestScore=0;
let bgOffset=0, invincible=0;

// ── PLAYER ────────────────────────────────────────────────
const player = {
  x:70, y:GROUND, w:28, h:36,
  vy:0, onGround:true, jumpCount:0,
  animFrame:0, animTick:0, ducking:false,

  jump(){
    if(this.ducking) return;
    if(this.jumpCount<2){
      this.vy = this.jumpCount===0 ? -10 : -8;
      this.onGround=false; this.jumpCount++;
      spawnParticles(this.x+this.w/2, this.y+this.h, '#e94560', 5);
    }
  },
  duck(on){ this.ducking=on; },

  update(){
    this.vy += .45;
    this.y  += this.vy;
    if(this.y>=GROUND){ this.y=GROUND; this.vy=0; this.onGround=true; this.jumpCount=0; }
    this.animTick++;
    if(this.animTick%8===0) this.animFrame=(this.animFrame+1)%4;
    if(invincible>0) invincible--;
  },

  draw(){
    if(invincible>0 && Math.floor(invincible/4)%2===0) return;
    const px=this.x, py=this.y;
    const dy = this.ducking ? py + this.h*0.5 : py;

    ctx.save(); ctx.globalAlpha=.3; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(px+this.w/2,GROUND+this.h+2,14,4,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    if(this.ducking){
      ctx.fillStyle='#e94560'; ctx.beginPath(); ctx.roundRect(px+2,dy+4,24,16,4); ctx.fill();
      ctx.fillStyle='#f5c5a3'; ctx.beginPath(); ctx.roundRect(px+6,dy-2,16,12,6); ctx.fill();
      ctx.fillStyle='#333'; ctx.beginPath(); ctx.roundRect(px+5,dy-4,18,7,[6,6,0,0]); ctx.fill();
      ctx.fillStyle='#222'; ctx.fillRect(px+9,dy+2,3,3); ctx.fillRect(px+16,dy+2,3,3);
      return;
    }

    ctx.fillStyle='#e94560'; ctx.beginPath(); ctx.roundRect(px+4,py+12,20,22,4); ctx.fill();
    ctx.fillStyle='#f5c5a3'; ctx.beginPath(); ctx.roundRect(px+6,py,16,16,8); ctx.fill();
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.roundRect(px+5,py-2,18,8,[6,6,0,0]); ctx.fill();
    ctx.fillStyle='#222'; ctx.fillRect(px+9,py+5,3,3); ctx.fillRect(px+16,py+5,3,3);
    ctx.fillStyle='#16213e';
    const lo=this.onGround?Math.sin(this.animFrame*Math.PI/2)*5:0;
    ctx.beginPath(); ctx.roundRect(px+5,py+30,8,10+lo,3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px+15,py+30,8,10-lo,3); ctx.fill();
    ctx.fillStyle='#e94560';
    ctx.beginPath(); ctx.roundRect(px+3,py+38+lo,12,5,2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px+13,py+38-lo,12,5,2); ctx.fill();
    ctx.fillStyle='#f5c5a3';
    const ao=this.onGround?Math.cos(this.animFrame*Math.PI/2)*5:-4;
    ctx.beginPath(); ctx.roundRect(px-2,py+14+ao,7,14,3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(px+23,py+14-ao,7,14,3); ctx.fill();
  },

  getBox(){
    if(this.ducking) return {x:this.x+2,y:this.y+this.h*0.5,w:24,h:this.h*0.5};
    return {x:this.x+4,y:this.y+2,w:20,h:this.h+2};
  }
};

// ── OBSTACLE TYPES ────────────────────────────────────────
function drawCactus(x,y,w,h){ ctx.fillStyle='#27ae60'; ctx.beginPath(); ctx.roundRect(x+5,y,8,h,4); ctx.fill(); ctx.beginPath(); ctx.roundRect(x,y+10,8,6,3); ctx.fill(); ctx.beginPath(); ctx.roundRect(x+10,y+16,8,6,3); ctx.fill(); ctx.fillStyle='#2ecc71'; ctx.beginPath(); ctx.roundRect(x+5,y,8,h-4,3); ctx.fill(); }
function drawRock(x,y,w,h){ ctx.fillStyle='#7f8c8d'; ctx.beginPath(); ctx.ellipse(x+w/2,y+h,w/2,h/2,0,Math.PI,0); ctx.fill(); ctx.fillStyle='#95a5a6'; ctx.beginPath(); ctx.ellipse(x+w/2,y+h-2,w/2-2,h/2-2,0,Math.PI,0); ctx.fill(); }
function drawBox(x,y,w,h){ ctx.fillStyle='#e67e22'; ctx.beginPath(); ctx.roundRect(x,y,w,h,3); ctx.fill(); ctx.fillStyle='#d35400'; ctx.fillRect(x,y+h/2-2,w,4); ctx.fillRect(x+w/2-2,y,4,h); }
function drawSpike(x,y,w,h){ ctx.fillStyle='#9b59b6'; ctx.beginPath(); ctx.moveTo(x,y+h); ctx.lineTo(x+w/2,y); ctx.lineTo(x+w,y+h); ctx.closePath(); ctx.fill(); ctx.fillStyle='#8e44ad'; ctx.beginPath(); ctx.moveTo(x+2,y+h); ctx.lineTo(x+w/2,y+4); ctx.lineTo(x+w-2,y+h); ctx.closePath(); ctx.fill(); }
const OBS_DEFS = [{w:18,h:38,draw:drawCactus},{w:30,h:22,draw:drawRock},{w:26,h:26,draw:drawBox},{w:22,h:32,draw:drawSpike}];

function spawnObstacleGroup(){
  const d = OBS_DEFS[Math.floor(Math.random()*OBS_DEFS.length)];
  const roll = Math.random();
  let count=1, gap=0;
  if(frame>600){ if(roll<.25){count=2;gap=22;} else if(roll<.4){count=3;gap=18;} }
  else if(frame>300){ if(roll<.2){count=2;gap=24;} }
  for(let i=0;i<count;i++){
    const xOff=i*(d.w+gap), h=d.h, y=GROUND+player.h-h;
    obstacles.push({x:W+20+xOff,y,w:d.w,h,draw:d.draw,passed:false});
  }
}

// ── COINS ─────────────────────────────────────────────────
function spawnCoin(){
  const floating=Math.random()<.5;
  const cy=floating ? GROUND-20-Math.floor(Math.random()*3)*20 : GROUND+player.h-16;
  coins.push({x:W+20,y:cy,r:8,collected:false,anim:0});
}
function drawCoin(c){
  c.anim++;
  const scaleX=Math.abs(Math.cos(c.anim*0.08));
  ctx.save(); ctx.translate(c.x,c.y); ctx.scale(scaleX,1);
  ctx.fillStyle='#f5a623'; ctx.save(); ctx.shadowColor='#f5a623'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle='#e67e22'; ctx.beginPath(); ctx.arc(0,0,c.r-3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f5a623'; ctx.font='bold 10px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('á',0,0);
  ctx.restore();
}

// ── FLYING ENEMIES ────────────────────────────────────────
function spawnEnemy(){
  const ey=GROUND+player.h-50-Math.floor(Math.random()*2)*20;
  enemies.push({x:W+20,y:ey,w:32,h:22,wingAnim:0,passed:false});
}
function drawEnemy(e){
  e.wingAnim++;
  const px=e.x,py=e.y,wingFlap=Math.sin(e.wingAnim*.15)*8;
  ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.ellipse(px+16,py+11,14,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e74c3c';
  ctx.beginPath(); ctx.moveTo(px+16,py+6); ctx.quadraticCurveTo(px,py-10+wingFlap,px-4,py+4); ctx.quadraticCurveTo(px+8,py+8,px+16,py+6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(px+16,py+6); ctx.quadraticCurveTo(px+32,py-10+wingFlap,px+36,py+4); ctx.quadraticCurveTo(px+24,py+8,px+16,py+6); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px+11,py+9,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(px+21,py+9,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(px+12,py+9,1.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(px+22,py+9,1.5,0,Math.PI*2); ctx.fill();
  if(e.x<W && e.x>W-80){ ctx.fillStyle='rgba(231,76,60,.7)'; ctx.font='10px Nunito'; ctx.textAlign='center'; ctx.fillText('⚠ ПРИГНИ!',px+16,py-8); }
}

// ── PARTICLES ─────────────────────────────────────────────
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({x,y,color,vx:(Math.random()-.5)*4,vy:-(Math.random()*4+1),life:1,decay:.05+Math.random()*.05,size:Math.random()*5+2});
}

// ── BACKGROUND ────────────────────────────────────────────
function drawBackground(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0d0d1a'); grad.addColorStop(1,'#1a1a3e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<30;i++){
    const sx=((i*53+bgOffset*(i%3+1)*.2)%W+W)%W, sy=(i*31)%(GROUND-20), ss=(i%3)*.5+.5;
    ctx.beginPath(); ctx.arc(sx,sy,ss,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#fffde7'; ctx.save(); ctx.shadowColor='#fffde7'; ctx.shadowBlur=15;
  ctx.beginPath(); ctx.arc(W-50,35,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a3e'; ctx.beginPath(); ctx.arc(W-44,30,14,0,Math.PI*2); ctx.fill(); ctx.restore();
  const gGrad=ctx.createLinearGradient(0,GROUND+player.h,0,H);
  gGrad.addColorStop(0,'#16213e'); gGrad.addColorStop(1,'#0d0d1a');
  ctx.fillStyle=gGrad; ctx.fillRect(0,GROUND+player.h,W,H-GROUND-player.h);
  ctx.save(); ctx.strokeStyle='#e94560'; ctx.lineWidth=2; ctx.shadowColor='#e94560'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(0,GROUND+player.h); ctx.lineTo(W,GROUND+player.h); ctx.stroke(); ctx.restore();
  ctx.strokeStyle='rgba(233,69,96,.12)'; ctx.lineWidth=1;
  const gs=40,go=(bgOffset*2)%gs;
  for(let gx=-go;gx<W;gx+=gs){ ctx.beginPath(); ctx.moveTo(gx,GROUND+player.h); ctx.lineTo(gx+20,H); ctx.stroke(); }
}

// ── GAME LOOP ──────────────────────────────────────────────
let nextCoin=0, nextEnemy=0, nextObstacle=0;

function gameLoop(){
  if(state!=='playing') return;
  frame++;
  speed=3+Math.floor(frame/400)*.5; if(speed>9) speed=9;

  if(frame>nextObstacle){ spawnObstacleGroup(); const mi=Math.max(70,130-Math.floor(frame/300)*10); nextObstacle=frame+mi+Math.floor(Math.random()*60); }
  if(frame>nextCoin){ spawnCoin(); nextCoin=frame+120+Math.floor(Math.random()*80); }
  if(frame>400 && frame>nextEnemy){ spawnEnemy(); nextEnemy=frame+200+Math.floor(Math.random()*150); }

  player.update();
  bgOffset=(bgOffset+speed*.5)%W;

  obstacles.forEach(o=>{ o.x-=speed; if(!o.passed && o.x+o.w<player.x){ o.passed=true; score+=5; } });
  obstacles=obstacles.filter(o=>o.x>-60);
  coins.forEach(c=>{ c.x-=speed; }); coins=coins.filter(c=>c.x>-20 && !c.collected);
  enemies.forEach(e=>{ e.x-=speed; }); enemies=enemies.filter(e=>e.x>-60);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=p.decay; }); particles=particles.filter(p=>p.life>0);

  if(frame%8===0) score++;

  if(invincible===0){
    const pb=player.getBox();
    for(const o of obstacles){
      if(pb.x<o.x+o.w-4 && pb.x+pb.w>o.x+4 && pb.y<o.y+o.h-2 && pb.y+pb.h>o.y+2){
        lives--; invincible=80; spawnParticles(player.x+player.w/2,player.y+player.h/2,'#e94560',15);
        obstacles=obstacles.filter(x=>x!==o); updateLivesHUD(); if(lives<=0){endGame();return;} break;
      }
    }
    for(const e of enemies){
      const eb={x:e.x+4,y:e.y+2,w:e.w-8,h:e.h-4};
      if(pb.x<eb.x+eb.w && pb.x+pb.w>eb.x && pb.y<eb.y+eb.h && pb.y+pb.h>eb.y){
        lives--; invincible=80; spawnParticles(player.x+player.w/2,player.y+player.h/2,'#c0392b',15);
        enemies=enemies.filter(x=>x!==e); updateLivesHUD(); if(lives<=0){endGame();return;} break;
      }
    }
  }

  const pb2=player.getBox();
  for(const c of coins){
    const dist=Math.hypot(c.x-pb2.x-pb2.w/2,c.y-pb2.y-pb2.h/2);
    if(dist<c.r+14){ c.collected=true; score+=10; spawnParticles(c.x,c.y,'#f5a623',8); particles.push({x:c.x,y:c.y-10,color:'#f5a623',vx:0,vy:-1.5,life:1,decay:.02,size:-1,text:'+10'}); }
  }

  ctx.clearRect(0,0,W,H); drawBackground();
  obstacles.forEach(o=>o.draw(o.x,o.y,o.w,o.h));
  coins.filter(c=>!c.collected).forEach(drawCoin);
  enemies.forEach(drawEnemy);
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    if(p.text){ ctx.fillStyle=p.color; ctx.font='bold 14px Nunito'; ctx.textAlign='center'; ctx.fillText(p.text,p.x,p.y); }
    else { ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  player.draw();
  document.getElementById('scoreDisplay').textContent=String(score).padStart(4,'0');
  document.getElementById('speedDisplay').textContent='x'+speed.toFixed(1);
  requestAnimationFrame(gameLoop);
}

// ── CONTROLS ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(state==='playing')player.jump();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();if(state==='playing')player.duck(true);}
});
document.addEventListener('keyup',e=>{ if(e.code==='ArrowDown'||e.code==='KeyS') player.duck(false); });
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); if(state!=='playing') return;
  const rect=canvas.getBoundingClientRect(), ty=e.touches[0].clientY-rect.top, relY=ty/rect.height;
  if(relY<.6) player.jump(); else player.duck(true);
},{passive:false});
canvas.addEventListener('touchend',e=>{ player.duck(false); },{passive:false});
canvas.addEventListener('mousedown',e=>{ if(state==='playing'){const rect=canvas.getBoundingClientRect(),relY=(e.clientY-rect.top)/rect.height;if(relY<.6)player.jump();else player.duck(true);} });
canvas.addEventListener('mouseup',()=>player.duck(false));

// ── GAME CONTROL ──────────────────────────────────────────
function updateLivesHUD(){
  document.querySelectorAll('.heart').forEach((h,i)=>h.classList.toggle('lost',i>=lives));
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('hintText').style.opacity='0';
  score=0; lives=3; speed=3; frame=0;
  obstacles=[]; coins=[]; enemies=[]; particles=[];
  player.y=GROUND; player.vy=0; player.onGround=true;
  player.jumpCount=0; player.animFrame=0; player.animTick=0; player.ducking=false;
  invincible=0; nextCoin=60; nextEnemy=400; nextObstacle=80;
  state='playing'; updateLivesHUD(); gameLoop();
}

// ── ОТРИМАННЯ ДАНИХ ГРАВЦЯ ────────────────────────────────
function getTgUser() {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (!tg) return { userId: null, userName: null, initData: null };

  // Спроба 1: initDataUnsafe (працює в більшості контекстів)
  const u = tg.initDataUnsafe && tg.initDataUnsafe.user;
  if (u && u.id) {
    const firstName = u.first_name || '';
    const lastName  = u.last_name  || '';
    return {
      userId:   String(u.id),
      userName: (firstName + ' ' + lastName).trim() || u.username || 'Гравець',
      initData: tg.initData || null
    };
  }

  // Спроба 2: парсимо initData вручну (рядок URL-encoded)
  // Telegram іноді передає initData але не парсить initDataUnsafe в груповому чаті
  try {
    const raw = tg.initData;
    if (raw && raw.length > 0) {
      const parsed = Object.fromEntries(new URLSearchParams(raw));
      if (parsed.user) {
        const pu = JSON.parse(decodeURIComponent(parsed.user));
        if (pu && pu.id) {
          const fn = pu.first_name || '';
          const ln = pu.last_name  || '';
          return {
            userId:   String(pu.id),
            userName: (fn + ' ' + ln).trim() || pu.username || 'Гравець',
            initData: raw
          };
        }
      }
    }
  } catch(e) { /* ігноруємо */ }

  return { userId: null, userName: null, initData: tg ? tg.initData : null };
}

// ── ВІДПРАВКА РЕЗУЛЬТАТУ — Telegram Games API ─────────────
async function sendScore(scoreVal) {
  const statusEl = document.getElementById('sendStatus');
  const tg = window.Telegram && window.Telegram.WebApp;

  statusEl.textContent = '⏳ Зберігаємо...';
  statusEl.className = 'send-status';

  // Збираємо userId з усіх можливих джерел
  let userId   = null;
  let userName = 'Гравець';
  const initData = tg ? (tg.initData || '') : '';

  if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
    const u  = tg.initDataUnsafe.user;
    userId   = String(u.id);
    const fn = u.first_name || '', ln = u.last_name || '';
    userName = (fn + ' ' + ln).trim() || u.username || 'Гравець';
  }
  if (!userId && initData) {
    try {
      const p = Object.fromEntries(new URLSearchParams(initData));
      if (p.user) {
        const u = JSON.parse(decodeURIComponent(p.user));
        if (u && u.id) {
          userId   = String(u.id);
          const fn = u.first_name || '', ln = u.last_name || '';
          userName = (fn + ' ' + ln).trim() || u.username || 'Гравець';
        }
      }
    } catch(e) {}
  }

  // Якщо є userId — відправляємо через deeplink автоматично
  if (userId) {
    const url = WEBHOOK_URL +
      '?type=game_result&game=runner' +
      '&score='    + Math.round(scoreVal) +
      '&userId='   + encodeURIComponent(userId) +
      '&userName=' + encodeURIComponent(userName);

    // Всі методи паралельно
    try { fetch(url, { method: 'GET', mode: 'no-cors', keepalive: true }); } catch(e) {}
    try { new Image().src = url + '&_t=' + Date.now(); } catch(e) {}
    try { if (navigator.sendBeacon) navigator.sendBeacon(url); } catch(e) {}
    try { const x = new XMLHttpRequest(); x.open('GET', url, true); x.timeout = 8000; x.send(); } catch(e) {}

    // Deeplink як основний надійний канал — через 1.5 сек після показу результату
    const tg = window.Telegram && window.Telegram.WebApp;
    const dlUrl = 'https://t.me/AGameMasterbot?start=runner_' + Math.round(scoreVal) + '_' + encodeURIComponent(userId);
    setTimeout(() => {
      try {
        if (tg && tg.openTelegramLink) { tg.openTelegramLink(dlUrl); return; }
        if (tg && tg.openLink) { tg.openLink(dlUrl); return; }
        window.location.href = dlUrl;
      } catch(e) {
        window.location.href = dlUrl;
      }
    }, 1500);

    statusEl.textContent = '✅ Результат збережено!';
    statusEl.className = 'send-status ok';
    return;
  }

  // Немає userId — кнопка
  const dl = 'https://t.me/AGameMasterbot?start=runner_' + Math.round(scoreVal);
  statusEl.innerHTML =
    '<a href="' + dl + '" style="color:#f5a623;font-weight:900;font-size:11px;" ' +
    'onclick="handleSaveClick(event,\'' + dl + '\')">👆 Зберегти результат</a>';
  statusEl.className = 'send-status err';
}

function handleSaveClick(e, url) {
  e.preventDefault();
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg && tg.openTelegramLink) { try { tg.openTelegramLink(url); return; } catch(ex) {} }
  window.location.href = url;
}

// ── END GAME ──────────────────────────────────────────────
function endGame(){
  state='dead';
  const isNewBest = score > bestScore;
  if(isNewBest) bestScore = score;

  document.getElementById('goScore').textContent = score + ' очок';
  document.getElementById('bestScore').textContent = bestScore;

  const statusEl = document.getElementById('sendStatus');
  if(isNewBest){
    statusEl.textContent = '⏳ Зберігаємо новий рекорд...';
    statusEl.className = 'send-status';
  } else {
    statusEl.textContent = '▸ Не новий рекорд';
    statusEl.className = 'send-status';
  }

  document.getElementById('gameOverOverlay').classList.remove('hidden');
  ctx.clearRect(0,0,W,H); drawBackground(); player.draw();
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,0,W,H);

  if(isNewBest) sendScore(score);
}

// ── IDLE LOOP ─────────────────────────────────────────────
function idleLoop(){
  if(state!=='idle') return;
  ctx.clearRect(0,0,W,H); drawBackground();
  player.animTick++; if(player.animTick%20===0) player.animFrame=(player.animFrame+1)%4;
  player.draw();
  requestAnimationFrame(idleLoop);
}

// ── INIT ──────────────────────────────────────────────────
speed=3; bgOffset=0; state='idle';
obstacles=[]; coins=[]; enemies=[]; particles=[];
idleLoop();

if(window.Telegram && window.Telegram.WebApp){
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
