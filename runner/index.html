<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>áClub Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#050d1a;overflow:hidden;touch-action:none;}
#c{display:block;position:fixed;top:0;left:0;width:100% !important;height:100% !important;}
.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:rgba(4,12,26,.95);z-index:99;padding:12px;gap:7px;overflow:hidden;}
.ov.hide{display:none;}
.title{font-family:'Press Start 2P',monospace;font-size:clamp(13px,3.5vw,20px);
       color:#00e676;text-align:center;line-height:1.4;letter-spacing:2px;
       text-shadow:0 0 20px rgba(0,230,118,.8);}
.tips{font-size:clamp(8px,2vw,11px);color:#90a4ae;text-align:center;line-height:1.8;max-width:380px;}
.tips b{color:#ccc;}
.row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.chip{padding:4px 9px;border-radius:6px;font-size:clamp(7px,1.8vw,9px);font-weight:900;
      border:1px solid rgba(255,255,255,.12);}
.cg{background:rgba(255,215,64,.15);color:#ffd740;}
.cb{background:rgba(255,23,68,.15);color:#ff7090;}
.medal{padding:5px 10px;border-radius:7px;font-size:clamp(8px,2vw,10px);font-weight:900;border:1px solid rgba(255,255,255,.12);}
.mg{background:rgba(255,215,64,.15);color:#ffd740;}
.ms{background:rgba(160,160,160,.15);color:#aaa;}
.mb{background:rgba(180,100,50,.15);color:#cd7f32;}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.5vw,12px);
     padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
     background:linear-gradient(135deg,#00c853,#00a152);color:#001a0a;
     box-shadow:0 4px 20px rgba(0,200,83,.4);width:100%;max-width:240px;margin-top:4px;}
.btn:active{transform:scale(.96);}
.score-big{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,28px);color:#ffd740;}
.best{font-size:clamp(10px,2.5vw,13px);color:#90a4ae;}
.best b{color:#eee;}
.st{font-size:9px;color:#90a4ae;text-align:center;min-height:14px;}
.st.ok{color:#00c853;}
.st.err{color:#ff1744;}
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;900&display=swap');
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- START OVERLAY -->
<div class="ov" id="ovS">
  <div class="title">áCLUB<br>RUNNER</div>
  <div class="tips">
    🍏 <b>Яблука</b> +10 · 🍎 <b>Червоне</b> +1á-coin<br>
    ✨ <b>Золотий вогник</b> — щит або магніт (3 сек)<br>
    🔴 <b>Червоний вогник</b> — не збирай яблука<br>
    👾 <b>Бос</b> — ▲ стрибай або — пригинайся!<br>
    ⚡ <b>Вихор</b> — назавжди ±1 до швидкості
  </div>
  <div class="row">
    <div class="medal mg">🥇 20 á</div>
    <div class="medal ms">🥈 15 á</div>
    <div class="medal mb">🥉 10 á</div>
  </div>
  <div class="row">
    <div class="chip cg">🛡 ЩИТ</div>
    <div class="chip cg">🧲 МАГНІТ</div>
    <div class="chip cb">🍏 НЕ ЗБИРАЙ</div>
  </div>
  <button class="btn" onclick="startGame()">▶ СТАРТ</button>
  <div style="font-size:9px;color:#546e7a;margin-top:-2px;">ТАП / ПРОБІЛ — СТРИБОК</div>
</div>

<!-- GAME OVER OVERLAY -->
<div class="ov hide" id="ovE">
  <div class="title">GAME<br>OVER</div>
  <div class="score-big" id="endSc">0</div>
  <div class="best">Рекорд: <b id="bestSc">0</b></div>
  <div class="st" id="sendSt"></div>
  <button class="btn" onclick="startGame()" style="max-width:180px">↺ ЩЕ РАЗ</button>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbwIPJ0SNczeY91LhANfg8t3aFCD1l8YWugZRRw0hJj9rIbXnOc-sTpKUETc_Kw3_Y9t/exec';
const WRK='https://aclub-runner.rjcnz-faw4.workers.dev';

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
if(window.Telegram&&window.Telegram.WebApp){
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
let state='idle',score=0,lives=3,speed=0,frame=0,bestScore=0;
let dt=1,lastTime=0,speedMod=0,boostLabel='',inv=0;
let obstacles=[],apples=[],boosters=[],particles=[],flyingEnemies=[],bossBullets=[],speedMods=[];
let bgOff=0,grOff=0;
let shield=false,shieldTime=0,magnet=false,magnetTime=0,noApples=false,noApplesTime=0;
let boss=null,bossActive=false;
let nextSpeedMod=400,nextApple=0,nextBooster=0,nextEnemy=0;
let redAppleSpawned=false;
let gameCount=parseInt(localStorage.getItem('ag')||'0');
const BDUR=60*3;
let W,H,GY,PH,FL,SCALE;

function resize(){
  W=window.innerWidth||screen.width;
  H=window.innerHeight||screen.height;
  if(window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.viewportHeight>100){
    H=window.Telegram.WebApp.viewportStableHeight||window.Telegram.WebApp.viewportHeight||H;
    W=window.Telegram.WebApp.viewportWidth||W;
  }
  cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';
  SCALE=Math.min(W/520,H/230);
  GY=H-Math.round(44*SCALE);PH=Math.round(36*SCALE);FL=GY-PH;
}
window.addEventListener('resize',resize);
if(window.Telegram&&window.Telegram.WebApp){window.Telegram.WebApp.onEvent('viewportChanged',resize);}

const P={
  get x(){return Math.round(70*SCALE);},
  y:0,vy:0,onGround:true,jc:0,af:0,at:0,
  init(){this.y=FL;this.vy=0;this.onGround=true;this.jc=0;this.af=0;this.at=0;},
  jump(){
    if(this.jc<2){
      const h1=90*SCALE,h2=60*SCALE;
      this.vy=this.jc===0?-Math.sqrt(2*0.44*h1):-Math.sqrt(2*0.44*h2);
      this.onGround=false;this.jc++;spawnP(this.x+s(14),this.y+PH,'#00e676',5);
    }
  },
  update(){
    this.vy+=0.44*dt;this.y+=this.vy*dt;
    if(this.y>=FL){this.y=FL;this.vy=0;this.onGround=true;this.jc=0;}
    this.at+=dt;if(this.at>=7){this.at=0;this.af=(this.af+1)%4;}
    if(inv>0)inv-=dt;
    if(shieldTime>0){shieldTime-=dt;if(shieldTime<=0){shield=false;boostLabel='';}}
    if(magnetTime>0){magnetTime-=dt;if(magnetTime<=0){magnet=false;boostLabel='';}}
    if(noApplesTime>0){noApplesTime-=dt;if(noApplesTime<=0){noApples=false;boostLabel='';}}
  },
  draw(){
    if(inv>0&&Math.floor(inv/4)%2===0)return;
    const px=this.x,py=Math.round(this.y);
    const run=this.onGround?Math.sin(this.af*Math.PI/2):0;
    ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(px+s(14),GY+s(2),s(12),s(3),0,0,Math.PI*2);ctx.fill();ctx.restore();
    if(shield){ctx.save();ctx.globalAlpha=.5;ctx.strokeStyle='#00e5ff';ctx.lineWidth=s(3);
      ctx.shadowColor='#00e5ff';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(px+s(14),py+PH/2,s(24),0,Math.PI*2);ctx.stroke();ctx.restore();}
    const lo=run*s(5),arm=this.onGround?Math.cos(this.af*Math.PI/2)*s(4):-s(3);
    const d=noApples;
    const BC=d?'#ff1744':'#00c853',DC=d?'#c0003c':'#004d40',LC=d?'#ff6090':'#00a152',SK=d?'#ff6090':'#a5d6a7',HC=d?'#c0003c':'#00c853';
    ctx.fillStyle=LC;ctx.beginPath();ctx.roundRect(px+s(4),py+s(26),s(9),s(13)+lo,s(3));ctx.fill();
    ctx.beginPath();ctx.roundRect(px+s(15),py+s(26),s(9),s(13)-lo,s(3));ctx.fill();
    ctx.fillStyle=DC;ctx.beginPath();ctx.roundRect(px+s(2),py+s(37)+lo,s(13),s(4),s(2));ctx.fill();
    ctx.beginPath();ctx.roundRect(px+s(13),py+s(37)-lo,s(13),s(4),s(2));ctx.fill();
    ctx.fillStyle=BC;ctx.beginPath();ctx.roundRect(px+s(3),py+s(12),s(22),s(18),s(5));ctx.fill();
    ctx.fillStyle=DC;ctx.font=`bold ${s(11)}px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('á',px+s(14),py+s(21));
    ctx.fillStyle=BC;ctx.beginPath();ctx.roundRect(px-s(3),py+s(13)+arm,s(7),s(12),s(3));ctx.fill();
    ctx.beginPath();ctx.roundRect(px+s(24),py+s(13)-arm,s(7),s(12),s(3));ctx.fill();
    ctx.fillStyle=SK;ctx.beginPath();ctx.roundRect(px+s(4),py,s(20),s(16),s(8));ctx.fill();
    ctx.fillStyle=HC;ctx.beginPath();ctx.roundRect(px+s(3),py-s(3),s(22),s(8),[s(6),s(6),0,0]);ctx.fill();
    ctx.fillStyle='#1a237e';ctx.fillRect(px+s(8),py+s(5),s(3),s(3));ctx.fillRect(px+s(17),py+s(5),s(3),s(3));
    ctx.strokeStyle='#1a237e';ctx.lineWidth=s(1.5);ctx.beginPath();ctx.arc(px+s(14),py+s(11),s(4),0.2,Math.PI-0.2);ctx.stroke();
  },
  box(){return{x:this.x+s(4),y:this.y+s(2),w:s(20),h:PH-s(2)};}
};
function s(v){return Math.round(v*SCALE);}
resize();P.y=FL;

const KB=[{w:44,h:58,t:'b'},{w:18,h:92,t:'t'},{w:62,h:46,t:'b'},{w:28,h:72,t:'d'},{w:36,h:52,t:'b'},{w:52,h:62,t:'b'},{w:22,h:82,t:'t'},{w:46,h:42,t:'b'},{w:32,h:98,t:'m'}];
let BL=[];
function initBL(){BL=[];let bx=0;while(bx<W*4){const b=KB[Math.floor(Math.random()*KB.length)];BL.push({...b,ox:bx,ws:b.w*SCALE,hs:b.h*SCALE});bx+=b.w*SCALE+Math.floor(Math.random()*10);}}
function drawBld(b,x,al){
  const by=GY-b.hs;ctx.save();ctx.globalAlpha=al;ctx.fillStyle=al>0.6?'#0a1e30':'#1e3a5f';
  if(b.t==='b'){ctx.fillRect(x,by,b.ws,b.hs);ctx.fillStyle='rgba(255,220,100,.1)';for(let wy=by+6;wy<GY-4;wy+=s(10))for(let wx=x+4;wx<x+b.ws-4;wx+=s(8))if((Math.floor(wx)*7+Math.floor(wy)*3)%11>4)ctx.fillRect(wx,wy,s(4),s(5));}
  else if(b.t==='t'){ctx.fillRect(x+s(4),by,b.ws-s(8),b.hs);ctx.beginPath();ctx.moveTo(x,by+s(5));ctx.lineTo(x+b.ws/2,by-s(15));ctx.lineTo(x+b.ws,by+s(5));ctx.fill();}
  else if(b.t==='d'){ctx.fillRect(x+s(5),by+s(20),b.ws-s(10),b.hs-s(20));ctx.beginPath();ctx.arc(x+b.ws/2,by+s(22),(b.ws-s(10))/2,Math.PI,0);ctx.fill();}
  else if(b.t==='m'){ctx.fillRect(x+s(8),by+s(40),s(8),b.hs-s(40));ctx.fillStyle=al>0.6?'#152840':'#2a4a6a';ctx.beginPath();ctx.moveTo(x+s(4),by+s(40));ctx.lineTo(x+s(12),by+s(15));ctx.lineTo(x+s(20),by+s(40));ctx.fill();ctx.beginPath();ctx.arc(x+s(12),by+s(12),s(5),0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function drawBG(){
  const sg=ctx.createLinearGradient(0,0,0,GY);sg.addColorStop(0,'#050d1a');sg.addColorStop(.6,'#0d2137');sg.addColorStop(1,'#1a3a5c');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.45)';
  for(let i=0;i<50;i++){const sx=((i*67+bgOff*.05)%W+W)%W,sy=(i*29)%(GY*.6),ss=(i%3)*.4+.3;ctx.beginPath();ctx.arc(sx,sy,ss,0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.shadowColor='#fffde7';ctx.shadowBlur=20;ctx.fillStyle='#fffde7';ctx.beginPath();ctx.arc(W-s(55),s(28),s(16),0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d2137';ctx.beginPath();ctx.arc(W-s(49),s(24),s(12),0,Math.PI*2);ctx.fill();ctx.restore();
  const b2=(bgOff*.28)%(W*4);for(const b of BL){const bx=((b.ox-b2)%(W*4)+W*4)%(W*4)-W*.3;if(bx>-200&&bx<W+200)drawBld(b,bx,.4);}
  const b1=(bgOff*.55)%(W*4);for(let i=0;i<BL.length;i+=2){const b=BL[i];const bx=((b.ox-b1)%(W*4)+W*4)%(W*4)-W*.3;if(bx>-200&&bx<W+200)drawBld(b,bx,.8);}
  const gg=ctx.createLinearGradient(0,GY,0,H);gg.addColorStop(0,'#1a3a1a');gg.addColorStop(1,'#0a1a0a');
  ctx.fillStyle=gg;ctx.fillRect(0,GY,W,H-GY);
  ctx.save();ctx.strokeStyle='#00c853';ctx.lineWidth=2;ctx.shadowColor='#00c853';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();ctx.restore();
  ctx.strokeStyle='rgba(0,200,83,.07)';ctx.lineWidth=1;const go=grOff%s(48);
  for(let gx=-go;gx<W;gx+=s(48)){ctx.beginPath();ctx.moveTo(gx,GY);ctx.lineTo(gx,H);ctx.stroke();}
}
function drawHUD(){
  const fs=Math.round(Math.max(13,Math.min(18*SCALE,22)));
  const fl=Math.round(Math.max(18,Math.min(22*SCALE,28)));
  const fsp=Math.round(Math.max(11,Math.min(14*SCALE,18)));
  const hudH=Math.round(Math.max(44,54*SCALE)),pad=8;
  ctx.fillStyle='rgba(5,15,30,.9)';ctx.beginPath();ctx.roundRect(pad,pad,W-pad*2,hudH,8);ctx.fill();
  ctx.strokeStyle='rgba(0,200,83,.25)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(pad,pad,W-pad*2,hudH,8);ctx.stroke();
  ctx.fillStyle='#ffd740';ctx.font=`bold ${fs}px "Press Start 2P",monospace`;ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(String(Math.floor(score)).padStart(4,'0'),pad+12,pad+hudH/2);
  const hx=W/2-fl;
  for(let i=0;i<3;i++){ctx.globalAlpha=i<lives?1:.2;ctx.font=`${fl}px Arial`;ctx.textAlign='center';ctx.fillText('💚',hx+i*fl*1.1,pad+hudH/2+2);}
  ctx.globalAlpha=1;
  ctx.fillStyle='#00e676';ctx.font=`bold ${fsp}px "Press Start 2P",monospace`;ctx.textAlign='right';
  const bw=boostLabel?ctx.measureText(boostLabel).width+10:0;
  ctx.fillText('x'+speed.toFixed(1),W-pad-12-bw,pad+hudH/2);
  if(boostLabel){ctx.fillStyle='#fff';ctx.font=`bold ${fsp+2}px Nunito`;ctx.textAlign='right';ctx.fillText(boostLabel,W-pad-12,pad+hudH/2);}
}

const OT=[
  {id:'cone',w:22,h:32,draw(x,y,w,h){ctx.fillStyle='#ff6f00';ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.fill();ctx.fillStyle='#ffcc02';ctx.beginPath();ctx.moveTo(x+w*.18,y+h*.85);ctx.lineTo(x+w/2,y+h*.2);ctx.lineTo(x+w*.82,y+h*.85);ctx.fill();ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillRect(x+w*.14,y+h*.38,w*.72,h*.05);ctx.fillRect(x+w*.23,y+h*.62,w*.54,h*.05);ctx.fillStyle='#e65100';ctx.beginPath();ctx.roundRect(x-s(2),y+h-s(4),w+s(4),s(4),s(2));ctx.fill();}},
  {id:'barrier',w:16,h:46,draw(x,y,w,h){ctx.fillStyle='#d32f2f';ctx.beginPath();ctx.roundRect(x+w*.25,y,w*.5,h,s(3));ctx.fill();ctx.fillStyle='#ffeb3b';ctx.fillRect(x+w*.19,y+h*.17,w*.62,h*.1);ctx.fillRect(x+w*.19,y+h*.46,w*.62,h*.1);ctx.fillRect(x+w*.19,y+h*.75,w*.62,h*.1);ctx.save();ctx.fillStyle='#ffd740';ctx.shadowColor='#ffd740';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(x+w/2,y+s(5),s(5),0,Math.PI*2);ctx.fill();ctx.restore();}},
  {id:'pit',w:50,h:10,isPit:true,draw(x,y,w,h){ctx.fillStyle='#000a00';ctx.fillRect(x,GY,w,H-GY);ctx.fillStyle='#ff1744';ctx.fillRect(x,GY-s(3),w,s(3));ctx.fillStyle='#b71c1c';for(let sx=x+s(3);sx<x+w-s(3);sx+=s(9)){ctx.beginPath();ctx.moveTo(sx,GY+s(3));ctx.lineTo(sx+s(4.5),GY+s(16));ctx.lineTo(sx+s(9),GY+s(3));ctx.fill();}}},
  {id:'box',w:30,h:30,draw(x,y,w,h){ctx.fillStyle='#e65100';ctx.beginPath();ctx.roundRect(x,y,w,h,s(4));ctx.fill();ctx.fillStyle='#ff8f00';ctx.beginPath();ctx.roundRect(x+s(2),y+s(2),w-s(4),h/2-s(3),s(3));ctx.fill();ctx.fillStyle='#bf360c';ctx.fillRect(x,y+h/2-s(2),w,s(4));ctx.fillRect(x+w/2-s(2),y,s(4),h);ctx.strokeStyle='#ffcc02';ctx.lineWidth=s(1.5);ctx.beginPath();ctx.roundRect(x+s(1),y+s(1),w-s(2),h-s(2),s(3));ctx.stroke();}},
  {id:'spike',w:26,h:36,draw(x,y,w,h){ctx.fillStyle='#4a148c';ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.fill();ctx.fillStyle='#9c27b0';ctx.beginPath();ctx.moveTo(x+w*.19,y+h);ctx.lineTo(x+w/2,y+h*.17);ctx.lineTo(x+w*.81,y+h);ctx.fill();ctx.strokeStyle='#e040fb';ctx.lineWidth=s(1);ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.stroke();}},
];

function safeGapPx(){
  const reactionSec=Math.max(1.4,1.4+(speed-4.5)*0.08);
  return speed*60*reactionSec*SCALE+Math.random()*s(80);
}
function spawnGroup(){
  const r=Math.random();let count=1;
  if(score>400&&r<0.28)count=2;if(score>800&&r<0.12)count=3;
  let xOff=W+s(30);
  for(let i=0;i<count;i++){
    const avail=score<150?OT.filter(t=>!t.isPit):OT;
    const pool=count>1?OT.filter(t=>!t.isPit):avail;
    const ob=pool[Math.floor(Math.random()*pool.length)];
    const ow=s(ob.w),oh=s(ob.h);
    obstacles.push({...ob,x:xOff,y:ob.isPit?GY:GY-oh,w:ow,h:oh,passed:false,origW:ob.w,origH:ob.h});
    xOff+=ow+s(10);
  }
}
function lastObsRight(){if(!obstacles.length)return -9999;const o=obstacles[obstacles.length-1];return o.x+o.w;}

function trySpawnEnemy(){
  const onScreen=obstacles.filter(o=>o.x>0&&o.x<W);
  if(onScreen.length>0||flyingEnemies.length>0)return;
  const ey=GY-s(58)-Math.floor(Math.random()*2)*s(18);
  flyingEnemies.push({x:W+s(30),y:ey,homeX:W*.68+Math.random()*s(60),w:s(32),h:s(22),wa:0,phase:'enter',baseY:ey});
}
function updateFlyingEnemy(e){
  e.wa+=dt;
  if(e.phase==='enter'){e.x-=speed*SCALE*dt;if(e.x<=e.homeX)e.phase='hover';}
  else{e.x=e.homeX+Math.sin(e.wa*.04)*s(8);}
  e.y=e.baseY+Math.sin(e.wa*.07)*s(3);
}
function drawFlyingEnemy(e){
  const px=e.x,py=e.y,flap=Math.sin(e.wa*.18)*s(10);
  ctx.fillStyle='#b71c1c';ctx.beginPath();ctx.ellipse(px+e.w/2,py+e.h*.55,e.w/2,e.h*.36,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e53935';
  ctx.beginPath();ctx.moveTo(px+e.w/2,py+e.h*.32);ctx.quadraticCurveTo(px-s(2),py-s(9)+flap,px-s(6),py+s(4));ctx.quadraticCurveTo(px+s(8),py+s(9),px+e.w/2,py+e.h*.32);ctx.fill();
  ctx.beginPath();ctx.moveTo(px+e.w/2,py+e.h*.32);ctx.quadraticCurveTo(px+e.w+s(2),py-s(9)+flap,px+e.w+s(6),py+s(4));ctx.quadraticCurveTo(px+e.w-s(8),py+s(9),px+e.w/2,py+e.h*.32);ctx.fill();

function spawnP(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,color,text:null,vx:(Math.random()-.5)*s(5),vy:-(Math.random()*s(5)+s(1)),life:1,decay:.04+Math.random()*.04,size:Math.random()*s(5)+s(2)});}
function spawnT(x,y,text,color){particles.push({x,y,color,text,vx:0,vy:-s(1.8),life:1,decay:.018,size:0});}

function gameLoop(ts){
  if(state!=='playing')return;
  if(!lastTime)lastTime=ts;
  const el=ts-lastTime;lastTime=ts;
  dt=Math.min(el/16.667,3);frame+=dt;
  let bs=4.5+Math.floor(score/150)*.4+speedMod;
  if(bs<2)bs=2;if(bs>14)bs=14;speed=bs;
  score+=dt*.15;
  bgOff=(bgOff+speed*SCALE*dt*.38)%(W*4);
  grOff=(grOff+speed*SCALE*dt)%s(48);
  if(!bossActive){
    const z=getBossZone(Math.floor(score));
    if(z&&Math.floor(score)>=z.start&&Math.floor(score)<=z.end&&!boss)spawnBoss(z.level);
  }
  if(boss){
    const z=getBossZone(Math.floor(score)-1);
    if(z&&Math.floor(score)>z.end+50&&boss.phase==='fight'){boss.phase='flee';boss.vx=s(3);}
    if(boss.phase==='flee'){boss.x+=boss.vx*2*dt;if(boss.x>W+s(100)){boss=null;bossActive=false;bossBullets=[];nextEnemy=frame+300;}}
  }
  if(!bossActive){
    if(lastObsRight()<W-safeGapPx()&&frame>80)spawnGroup();
    if(frame>nextApple){trySpawnApple();nextApple=frame+80+Math.random()*60;}
    if(frame>nextBooster&&score>60){trySpawnBooster();nextBooster=frame+300+Math.random()*120;}
    if(score>=nextSpeedMod){trySpawnSpeedMod();nextSpeedMod+=400+Math.random()*200;}
    if(frame>nextEnemy&&score>=500){trySpawnEnemy();nextEnemy=frame+250+Math.random()*120;}
  }else{
    if(frame>nextApple){trySpawnApple();nextApple=frame+80;}
    if(frame>nextBooster&&score>60){trySpawnBooster();nextBooster=frame+300;}
  }
  P.update();
  const spd=speed*SCALE*dt;
  obstacles.forEach(o=>{o.x-=spd;if(!o.passed&&o.x+o.w<P.x){o.passed=true;score+=5;spawnT(P.x+s(14),P.y-s(12),'+5','#69f0ae');}});
  obstacles=obstacles.filter(o=>o.x>-s(80));
  apples.forEach(a=>{a.x-=spd;});apples=apples.filter(a=>a.x>-s(30)&&!a.collected);
  boosters.forEach(b=>{b.x-=spd;});boosters=boosters.filter(b=>b.x>-s(30)&&!b.collected);
  speedMods.forEach(m=>{m.x-=spd;});speedMods=speedMods.filter(m=>m.x>-s(30)&&!m.collected);
  flyingEnemies.forEach(updateFlyingEnemy);flyingEnemies=flyingEnemies.filter(e=>e.x>-s(80));
  if(boss&&boss.phase==='enter'){boss.x+=boss.vx*dt;if(boss.x<=W*.58)boss.phase='fight';}
  if(boss&&boss.phase==='fight'){
    boss.x+=Math.sin(boss.anim*.03)*s(1.2)*dt;boss.shootTimer-=dt;
    if(boss.shootTimer<=0){
      boss.pat=(boss.pat+1)%5;
      if(boss.pat===0){bossBullets.push({x:boss.x,y:GY-s(14),vx:-s(6),vy:0,r:s(10),hint:'▲'});}
      else if(boss.pat===1){bossBullets.push({x:boss.x,y:GY-s(14),vx:-s(5.5),vy:0,r:s(9),hint:'▲'});bossBullets.push({x:boss.x-s(25),y:GY-s(42),vx:-s(5),vy:0,r:s(8),hint:'—'});}
      else if(boss.pat===2){bossBullets.push({x:boss.x,y:GY-s(20),vx:-s(9),vy:0,r:s(9),hint:'▲'});}
      else if(boss.pat===3){bossBullets.push({x:boss.x,y:GY-s(50),vx:-s(6),vy:0,r:s(9),hint:'—'});}
      else{bossBullets.push({x:boss.x,y:GY-s(14),vx:-s(6),vy:0,r:s(8),hint:'▲'});setTimeout(()=>{if(boss)bossBullets.push({x:boss.x,y:GY-s(35),vx:-s(6),vy:0,r:s(8),hint:'—'});},400);setTimeout(()=>{if(boss)bossBullets.push({x:boss.x,y:GY-s(14),vx:-s(6),vy:0,r:s(8),hint:'▲'});},800);}
      boss.shootTimer=80+Math.random()*40;
    }
  }
  bossBullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;});bossBullets=bossBullets.filter(b=>b.x>-s(20)&&b.y<H+s(20));
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.12*SCALE*dt;p.life-=p.decay*dt;});particles=particles.filter(p=>p.life>0);
  const pb=P.box();
  function hitShield(rm){if(shield){shield=false;shieldTime=0;inv=70;boostLabel='';spawnT(P.x+s(14),P.y-s(10),'ЩИТ!','#00e5ff');if(rm)rm();return true;}return false;}
  function hitPlayer(){lives--;inv=90;spawnP(P.x+s(14),P.y+PH/2,'#ff1744',15);if(lives<=0){endGame();return false;}return true;}
  if(inv<=0){
    for(const o of [...obstacles]){
      let hit=false;
      if(o.isPit){if(pb.x+pb.w>o.x+s(4)&&pb.x<o.x+o.w-s(4)&&pb.y+pb.h>=GY-s(2))hit=true;}
      else{if(pb.x<o.x+o.w-s(4)&&pb.x+pb.w>o.x+s(4)&&pb.y<o.y+o.h-s(2)&&pb.y+pb.h>o.y+s(2))hit=true;}
      if(hit){const rm=()=>{obstacles=obstacles.filter(x=>x!==o);};if(!hitShield(rm)){if(!hitPlayer())return;}else{if(!obstacles.includes(o)){}else obstacles=obstacles.filter(x=>x!==o);}break;}
    }
  }
  if(inv<=0){
    for(const e of [...flyingEnemies]){
      const eb={x:e.x+s(4),y:e.y+s(2),w:e.w-s(8),h:e.h-s(4)};
      if(pb.x<eb.x+eb.w&&pb.x+pb.w>eb.x&&pb.y<eb.y+eb.h&&pb.y+pb.h>eb.y){
        const rm=()=>{flyingEnemies=flyingEnemies.filter(x=>x!==e);};
        if(!hitShield(rm)){flyingEnemies=flyingEnemies.filter(x=>x!==e);if(!hitPlayer())return;}break;
      }
    }
    for(const b of bossBullets){
      if(pb.x<b.x+b.r&&pb.x+pb.w>b.x-b.r&&pb.y<b.y+b.r&&pb.y+pb.h>b.y-b.r){
        if(!hitShield(()=>{b.x=-9999;})){b.x=-9999;if(!hitPlayer())return;}break;
      }
    }
  }
  if(boss&&inv<=0&&(boss.phase==='fight'||boss.phase==='enter')){
    const bb={x:boss.x+s(6),y:boss.y+s(8),w:boss.w-s(12),h:boss.h-s(8)};
    if(!boss.passed&&P.y+PH<boss.y+s(20)&&pb.x+pb.w>bb.x&&pb.x<bb.x+bb.w){
      boss.hp--;boss.passed=true;spawnP(boss.x+boss.w/2,boss.y,'#ffd740',15);spawnT(boss.x+boss.w/2,boss.y-s(22),'HIT!','#ffd740');
      if(boss.hp<=0){score+=boss.level===1?100:(boss.level===2?250:400);spawnP(boss.x+boss.w/2,boss.y+boss.h/2,'#ffd740',30);boss=null;bossActive=false;bossBullets=[];}
      else setTimeout(()=>{if(boss)boss.passed=false;},800);
    }
    if(boss&&pb.x<bb.x+bb.w&&pb.x+pb.w>bb.x&&pb.y<bb.y+bb.h&&pb.y+pb.h>bb.y){if(!hitShield(null)){if(!hitPlayer())return;}}
  }
  const pb2=P.box();const pcx=pb2.x+pb2.w/2,pcy=pb2.y+PH/2;
  for(const a of apples){
    if(a.collected)continue;
    if(magnet&&!noApples){const dx=pcx-a.x,dy=pcy-a.y;const dist=Math.sqrt(dx*dx+dy*dy)||1;const pullSpeed=dist*0.25*dt;a.x+=dx/dist*pullSpeed;a.y+=dy/dist*pullSpeed;}
    const dist2=Math.hypot(a.x-pcx,a.y-pcy);
    if(dist2<a.r+s(14)&&!noApples){
      a.collected=true;
      if(a.isRed){score+=50;spawnP(a.x,a.y,'#ff1744',12);spawnT(a.x,a.y-s(16),'+1á','#ff1744');sendCoin();}
      else{score+=10;spawnP(a.x,a.y,'#00c853',8);spawnT(a.x,a.y-s(13),'+10','#00c853');}
    }
  }
  for(const b of boosters){if(Math.hypot(b.x-pb.x-pb.w/2,b.y-pb.y-PH/2)<b.r+s(16)&&!b.collected){if(b.id==='shield'&&shield)continue;b.collected=true;applyBooster(b);}}
  for(const m of speedMods){
    if(Math.hypot(m.x-pb.x-pb.w/2,m.y-pb.y-PH/2)<m.r+s(16)&&!m.collected){
      m.collected=true;speedMod=Math.max(-2,Math.min(4,speedMod+m.delta));
      spawnT(m.x,m.y-s(20),m.delta>0?'⚡+1':' 🐢-1',m.color);spawnP(m.x,m.y,m.color,10);
      boostLabel=m.delta>0?'⚡ ШВИДШЕ!':'🐢 ПОВІЛЬНІШЕ!';
      setTimeout(()=>{if(boostLabel.includes('ШВИ')||boostLabel.includes('ПОВІЛ'))boostLabel='';},2000);
    }
  }
  ctx.clearRect(0,0,W,H);drawBG();
  obstacles.forEach(o=>o.draw(o.x,o.y,o.w,o.h));
  apples.filter(a=>!a.collected).forEach(drawApple);
  boosters.filter(b=>!b.collected).forEach(drawBooster);
  speedMods.filter(m=>!m.collected).forEach(drawSpeedMod);
  flyingEnemies.forEach(drawFlyingEnemy);
  if(boss)drawBoss();
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;if(p.text){ctx.fillStyle=p.color;ctx.font=`bold ${s(13)}px Nunito`;ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);}else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}ctx.restore();});
  P.draw();drawHUD();
  if(bossActive&&boss&&boss.phase!=='flee'){
    ctx.save();ctx.globalAlpha=.8+Math.sin(frame*.2)*.2;ctx.fillStyle='#ff1744';ctx.shadowColor='#ff1744';ctx.shadowBlur=20;
    ctx.font=`bold ${s(11)}px "Press Start 2P"`;ctx.textAlign='center';
    ctx.fillText(boss.phase==='enter'?'⚠ БОС! ⚠':'⚡ СТРИБАЙ або ПРИГНИСЬ!',W/2,s(55));ctx.restore();
  }
  requestAnimationFrame(gameLoop);
}

  shield=false;shieldTime=0;magnet=false;magnetTime=0;noApples=false;noApplesTime=0;
  boss=null;bossActive=false;redAppleSpawned=false;nextSpeedMod=400;
  nextApple=50;nextBooster=260;nextEnemy=9999;
  _sessionStart=Date.now(); // фіксуємо час старту для захисту
  _submitDone=false;        // дозволяємо одну відправку за сесію
  P.init();state='playing';gameCount++;localStorage.setItem('ag',gameCount);
  requestAnimationFrame(gameLoop);
}
function endGame(){
  state='dead';
  const sc=Math.floor(score);if(sc>bestScore)bestScore=sc;
  document.getElementById('endSc').textContent=sc+' очок';
  document.getElementById('bestSc').textContent=bestScore;
  document.getElementById('sendSt').textContent='';document.getElementById('sendSt').className='st';
  document.getElementById('ovE').classList.remove('hide');
  ctx.clearRect(0,0,W,H);drawBG();P.draw();
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
  sendScore(sc);
}

function idleLoop(ts){
  if(state!=='idle')return;
  if(!lastTime)lastTime=ts;const el=ts-lastTime;lastTime=ts;const idt=Math.min(el/16.667,3);
  ctx.clearRect(0,0,W,H);drawBG();
  P.at+=idt;if(P.at>=18){P.at=0;P.af=(P.af+1)%4;}P.draw();
  ctx.save();ctx.globalAlpha=.5+Math.sin(Date.now()*.003)*.4;ctx.fillStyle='#00e676';
  ctx.font=`${s(10)}px "Press Start 2P"`;ctx.textAlign='center';ctx.fillText('ТАП / ПРОБІЛ',W/2,H-s(12));ctx.restore();
  requestAnimationFrame(idleLoop);
}

// ── SEND SCORE (захищена версія з timestamp) ─────────────────
function getTg(){const p=new URLSearchParams(window.location.hash.substring(1));return{uid:p.get('tgid'),cid:p.get('tgchat'),mid:p.get('tgmsg'),iid:p.get('tginline'),cur:p.get('current_msg')};}

// Внутрішній userId — встановлюється один раз при завантаженні, недоступний ззовні
const _tgData=(function(){const p=new URLSearchParams(window.location.hash.substring(1));return{uid:p.get('tgid'),cid:p.get('tgchat'),mid:p.get('tgmsg'),iid:p.get('tginline'),cur:p.get('current_msg')};})();

// Час старту — 0 означає гра не запускалась
let _sessionStart=0;
// Лічильник спроб відправки — захист від повторних викликів
let _submitDone=false;

async function sendScore(v){
  const st=document.getElementById('sendSt');
  st.textContent='⏳ Зберігаємо...';

  // Захист 1: гра повинна бути запущена через startGame()
  if(_sessionStart===0){
    st.textContent='';
    return;
  }

  // Захист 2: результат можна відправити тільки один раз за сесію
  if(_submitDone){
    st.textContent='';
    return;
  }
  _submitDone=true;

  // Захист 3: використовуємо внутрішній userId, не з консолі
  const uid=_tgData.uid;
  const cid=_tgData.cid;
  const mid=_tgData.mid;
  const iid=_tgData.iid;
  const cur=_tgData.cur;

  if(!uid){
    const dl='https://t.me/AGameMasterbot?start=runner_'+v;
    st.innerHTML='<a href="'+dl+'" style="color:#ffd740;font-size:8px;">👆 Зберегти результат</a>';
    st.className='st err';
    return;
  }

  // Захист 4: перевірка часу сесії
  const elapsed=Math.floor((Date.now()-_sessionStart)/1000);
  const minRequired=Math.floor(v*0.055);
  if(elapsed < minRequired){
    st.textContent='';
    return;
  }

  // Відправляємо ТІЛЬКИ через Worker — він верифікує через Telegram і потім викликає GAS
  if((cid&&mid)||iid){
    let q='user_id='+uid+'&score='+v+'&wt=wrk_aclub_8x92kQpL&elapsed='+elapsed;
    if(iid)q+='&inline_message_id='+encodeURIComponent(iid);
    else q+='&chat_id='+cid+'&message_id='+mid;
    if(cur)q+='&current_msg='+cur;
    try{
      const resp=await fetch(WRK+'?'+q);
      const data=await resp.json();
      if(data.ok){
        st.textContent='✅ Збережено!';st.className='st ok';
      } else {
        // Worker відхилив — fallback напряму в GAS
        try{new Image().src=GAS+'?type=game_result&game=runner&score='+v+'&userId='+uid+'&secret=aclub2026runner&elapsed='+elapsed+'&_t='+Date.now();}catch(e){}
        st.textContent='✅ Збережено!';st.className='st ok';
      }
    }catch(e){
      // Мережева помилка — fallback напряму в GAS
      try{new Image().src=GAS+'?type=game_result&game=runner&score='+v+'&userId='+uid+'&secret=aclub2026runner&elapsed='+elapsed+'&_t='+Date.now();}catch(e2){}
      st.textContent='✅ Збережено!';st.className='st ok';
    }
  } else {
    // Гра відкрита не через Telegram — результат не зберігається
    st.textContent='⚠️ Відкрий гру через Telegram!';
    st.className='st err';
  }
}

// Червоне яблуко — використовує внутрішній uid
function sendCoin(){
  const uid=_tgData.uid;
  if(!uid||_sessionStart===0)return;
  try{new Image().src=GAS+'?type=apple_coin&game=runner&userId='+uid+'&secret=aclub2026runner&_t='+Date.now();}catch(e){}
}

function handleSaveClick(e,u){e.preventDefault();const tg=window.Telegram&&window.Telegram.WebApp;if(tg&&tg.openTelegramLink){try{tg.openTelegramLink(u);return;}catch(x){}}window.location.href=u;}

// ── INIT ──────────────────────────────────────────────────────
state='idle';lastTime=0;P.y=FL||H-80;P.vy=0;P.onGround=true;P.jc=0;P.af=0;P.at=0;
obstacles=[];apples=[];boosters=[];particles=[];flyingEnemies=[];bossBullets=[];speedMods=[];
initBL();
requestAnimationFrame(idleLoop);
</script>
